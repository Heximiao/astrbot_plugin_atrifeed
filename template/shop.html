<!DOCTYPE html>
<html>
<head>
    <style>
        body {
            margin: 0; padding: 0;
            width: 1000px; height: 600px;
            overflow: hidden;
            font-family: "Microsoft YaHei", sans-serif;
            background: linear-gradient(135deg, #e0f7fa 0%, #b3e5fc 100%); 
        }
        .container {
            position: relative;
            width: 100%; height: 100%;
        }
        .lihui {
            position: absolute;
            left: 20px; 
            bottom: -190px; 
            height: 700px; 
            width: auto;
            z-index: 1;
            filter: drop-shadow(5px 5px 15px rgba(0,0,0,0.1));
        }
        .shop-content {
            position: absolute;
            top: 40px;
            right: 50px;
            width: 550px;
            background: rgba(255, 255, 255, 0.4); 
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            border: 1px solid rgba(255, 255, 255, 0.3);
            z-index: 10;
        }
        .shop-title {
            text-align: center;
            color: #37474f;
            margin: 0 0 20px 0;
            font-size: 24px;
            border-bottom: 2px solid #b0bec5;
            padding-bottom: 10px;
        }
        .item-row {
            display: flex;
            align-items: center;
            margin-bottom: 15px;
            padding: 12px 15px; /* 稍微增加内边距 */
            background: rgba(255, 255, 255, 0.2);
            border-radius: 12px;
        }
        .item-info {
            flex-grow: 1;
            /* 删除了之前的 margin-left: 15px，因为左侧图标没了 */
        }
        .item-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .item-name {
            font-size: 22px;
            font-weight: bold;
            color: #333;
        }
        .item-price {
            color: #d32f2f;
            font-size: 18px;
            font-weight: bold;
        }
        .item-desc {
            font-size: 14px;
            color: #666;
            margin-top: 4px;
        }
    </style>
</head>
<body>
    <div class="container">
        {% if lihui_path %}
        <img src="{{ lihui_path }}" class="lihui">
        {% endif %}

        <div class="shop-content">
            <h2 class="shop-title">🏪 亚托莉小卖部 ({{ date }})</h2>
            {% for item in items %}
            <div class="item-row">
                <div class="item-info">
                    <div class="item-header">
                        <span class="item-name">{{ item.item_name }}</span>
                        <span class="item-price">💰 {{ item.price }}</span>
                    </div>
                    <div class="item-desc">{{ item.description }}</div>
                </div>
            </div>
            {% endfor %}
            <p style="text-align: center; font-size: 14px; color: #546e7a; margin-top: 15px;">
                💡 输入 <strong style="color: #37474f;">[/商店 物品名]</strong> 即可购买
            </p>
        </div>
    </div>
</body>
</html>
